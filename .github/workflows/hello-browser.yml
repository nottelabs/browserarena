name: Hello Browser Benchmark

on:
  schedule:
    # Every Sunday at 06:00 UTC (low traffic window)
    - cron: "0 6 * * 0"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: self-hosted
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run benchmarks
        env:
          SECRET_BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          SECRET_BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
          SECRET_STEEL_API_KEY: ${{ secrets.STEEL_API_KEY }}
          SECRET_KERNEL_API_KEY: ${{ secrets.KERNEL_API_KEY }}
          SECRET_NOTTE_API_KEY: ${{ secrets.NOTTE_API_KEY }}
          SECRET_HYPERBROWSER_API_KEY: ${{ secrets.HYPERBROWSER_API_KEY }}
          SECRET_ANCHORBROWSER_API_KEY: ${{ secrets.ANCHORBROWSER_API_KEY }}
          SECRET_BROWSER_USE_API_KEY: ${{ secrets.BROWSER_USE_API_KEY }}
        run: |
          # Load .env as base (check checkout dir, then home)
          ENV_FILE=""
          [ -f .env ] && ENV_FILE=".env"
          [ -z "$ENV_FILE" ] && [ -f "$HOME/browserbench/.env" ] && ENV_FILE="$HOME/browserbench/.env"
          if [ -n "$ENV_FILE" ]; then
            set -a
            source "$ENV_FILE"
            set +a
          fi
          # Override with GitHub secrets if set
          [ -n "$SECRET_BROWSERBASE_API_KEY" ] && export BROWSERBASE_API_KEY="$SECRET_BROWSERBASE_API_KEY"
          [ -n "$SECRET_BROWSERBASE_PROJECT_ID" ] && export BROWSERBASE_PROJECT_ID="$SECRET_BROWSERBASE_PROJECT_ID"
          [ -n "$SECRET_STEEL_API_KEY" ] && export STEEL_API_KEY="$SECRET_STEEL_API_KEY"
          [ -n "$SECRET_KERNEL_API_KEY" ] && export KERNEL_API_KEY="$SECRET_KERNEL_API_KEY"
          [ -n "$SECRET_NOTTE_API_KEY" ] && export NOTTE_API_KEY="$SECRET_NOTTE_API_KEY"
          [ -n "$SECRET_HYPERBROWSER_API_KEY" ] && export HYPERBROWSER_API_KEY="$SECRET_HYPERBROWSER_API_KEY"
          [ -n "$SECRET_ANCHORBROWSER_API_KEY" ] && export ANCHORBROWSER_API_KEY="$SECRET_ANCHORBROWSER_API_KEY"
          [ -n "$SECRET_BROWSER_USE_API_KEY" ] && export BROWSER_USE_API_KEY="$SECRET_BROWSER_USE_API_KEY"
          npm run bench -- --provider=browserbase,steel,kernel,notte,hyperbrowser,anchorbrowser,browser-use --runs=5

      - name: Copy results to runner_results
        run: |
          DATE_STR=$(date -u +%Y-%m-%d)
          DEST="$HOME/runner_results/$DATE_STR"
          mkdir -p "$DEST"
          cp -r results/hello-browser/ "$DEST/"
          echo "Results saved to $DEST"
          find "$DEST" -type f | head -20

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          if ! git diff --cached --quiet; then
            DATE_STR=$(date -u +%Y-%m-%d)
            git commit -m "bench: weekly hello-browser results ${DATE_STR}"
            git push
          fi
